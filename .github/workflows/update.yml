name: System Sync // Live Data
on:
  schedule:
    - cron: '0 */12 * * *' # Ejecución cada 12 horas
  push:
    branches: [ main ]
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: Spotify 
    permissions:
      contents: write
      
    steps:
      - name: 1. Descargar Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Instalar Dependencias
        run: npm ci

      - name: 4. Ejecutar Motores de Datos
        env:
          XBOX_API_KEY: ${{ secrets.XBOX_API_KEY }}
          SPOTIFY_API_KEY: ${{ secrets.SPOTIFY_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          # Estos motores se ejecutan en cada ciclo (cada 12h)
          echo "--- EJECUTANDO MAL & XBOX ENGINES ---"
          node update_mal.js
          node update_xbox.js
          
          # Condicional para Spotify: Solo se ejecuta los Lunes (1)
          # date +%u devuelve 1 para Lunes, 2 para Martes, etc.
          if [ "$(date +%u)" = "1" ]; then
            echo "--- INICIANDO SYNC SEMANAL DE SPOTIFY ---"
            node update_spotify.js
          else
            echo "--- SPOTIFY SYNC SKIPPED: FUERA DE CICLO SEMANAL ---"
          fi

      - name: 5. Guardar cambios en el repositorio
        run: |
          git config --global user.name "Luisfenix117"
          git config --global user.email "45983058+Luisfenix117@users.noreply.github.com"
          
          # Añadimos los JSON generados
          git add assets/data/*.json
          
          if git diff --staged --quiet; then
            echo "Sin cambios detectados en los registros. Abortando commit."
          else
            # Commit con timestamp dinámico para el log de la terminal
            git commit -m "System Sync: Auto-update live logs [$(date +'%Y-%m-%d %H:%M')] [skip ci]"
            git push
          fi
        # Evita que el workflow falle si no hay cambios que subir
        continue-on-error: false