name: System Sync // Live Data
on:
  schedule:
    - cron: '0 */12 * * *' # Ejecución cada 12 horas
  push:
    branches: [ main ]
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: Spotify 
    permissions:
      contents: write
      
    steps:
      - name: 1. Descargar Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Instalar Dependencias
        run: npm ci

      - name: 4. Ejecutar Motores de Datos
        env:
          XBOX_API_KEY: ${{ secrets.XBOX_API_KEY }}
          SPOTIFY_API_KEY: ${{ secrets.SPOTIFY_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          node update_mal.js
          node update_xbox.js
          node update_spotify.js

      - name: 5. Guardar cambios en el repositorio
        run: |
          git config --global user.name "Luisfenix117"
          git config --global user.email "45983058+Luisfenix117@users.noreply.github.com"
          
          # Añadimos todos los JSON generados en la carpeta assets/data/
          git add assets/data/*.json
          
          if git diff --staged --quiet; then
            echo "Sin cambios detectados en los feeds. Saltando commit."
          else
            git commit -m "System: Update live feeds (MAL + Xbox + Spotify) [skip ci]"
            git push
          fi
        # Esta línea evita que el workflow se detenga si este paso no hace commit
        continue-on-error: false
