name: System Sync // Live Data
on:
  schedule:
    - cron: '0 */12 * * *' # Cada 12 horas
  push:
    branches: [ main ]
  workflow_dispatch: # Botón manual para pruebas

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: github-pages 
    permissions:
      contents: write
    steps:
      - name: 1. Descargar Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Instalar Dependencias
        run: npm ci

      - name: 4. Ejecutar Motores de Datos
        env:
          XBOX_API_KEY: ${{ secrets.XBOX_API_KEY }}
        run: |
          node update_mal.js
          node update_xbox.js

      - name: 5. Guardar cambios si hay diferencias
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Verificamos si hay algo que agregar antes de hacer commit
          git add assets/data/*.json
          
          # Usamos --quiet para que no ensucie los logs si no hay nada
          if git diff --staged --quiet; then
            echo "Sin cambios detectados en los archivos JSON."
          else
            git commit -m "System: Update feeds (MAL + Xbox) [skip ci]"
            git push origin main
          fi
