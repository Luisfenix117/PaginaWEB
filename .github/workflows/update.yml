name: System Sync // Live Data
on:
  schedule:
    - cron: '0 */12 * * *' # Cada 12 horas
  push:
    branches: [ main ]
  workflow_dispatch: # Botón manual para pruebas

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: github-pages 
    permissions:
      contents: write
    steps:
      - name: 1. Descargar Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Instalar Dependencias
        run: npm ci

      - name: 4. Ejecutar Motores de Datos
        env:
          XBOX_API_KEY: ${{ secrets.XBOX_API_KEY }}
        run: |
          node update_mal.js
          node update_xbox.js

      - name: 5. Guardar cambios si hay diferencias
        run: |
          
          git config --global user.name "Luisfenix117"
          git config --global user.email "45983058+Luisfenix117@users.noreply.github.com"
          
          # Agrega solo los archivos de datos para mantener el repo limpio
          git add assets/data/*.json
          
          # Verifica si hubo cambios reales antes de intentar el commit
          if git diff --staged --quiet; then
            echo "Sin cambios detectados en MAL o Xbox. Saltando commit."
          else
            git commit -m "System: Update live feeds (MAL + Xbox) [skip ci]"
            git push
          fi
            git commit -m "System: Update feeds (MAL + Xbox) [skip ci]"
            git push origin main
          fi
