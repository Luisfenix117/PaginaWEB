<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUIS_FENIX_117 // TERMINAL </title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="monitor-overlay"></div>

    <main class="viewport-canvas">
        
        <div class="panel panel-left ui-frame">
            <header class="panel-header">
                <span class="system-id">USER_DATA // LUIS_FENIX_117</span>
                <span class="status-indicator online">ONLINE</span>
            </header>
            <section class="panel-content">
                <div class="user-card">
                    <img class="user-banner" src="assets/img/banner.jpg" alt="Banner de Luis Fenix117">
                </div>
                <div class="separator-line"></div>

                <!-- --- INFO / CONTACTS --- -->
                <nav class="link-grid">
                    <a class="link-item" href="https://x.com/Luis_Torres117" target="_blank">
                    <img src="../PaginaWEB/assets/img/twitter.png" alt="Twitter">
                    <span>Twitter</span>
                    </a>
                    <a class="link-item no-link">
                    <img src="../PaginaWEB/assets/img/discord.png" alt="Discord">
                    <span>luisfenix117</span>
                    </a>
                    <a class="link-item" href="https://open.spotify.com/user/22iobqhnhbql55r52xrghrulq/playlists" target="_blank">
                    <img src="../PaginaWEB/assets/img/spotify.png" alt="Spotify">
                    <span>Spotify</span>
                    </a>
                    <a class="link-item" href="https://www.xbox.com/es-MX/play/user/luisfenix117" target="_blank">
                    <img src="../PaginaWEB/assets/img/xbox.png" alt="Xbox">
                    <span>Xbox</span>
                    </a>
                    <a class="link-item" href="https://steamcommunity.com/id/luis_torres117/" target="_blank">
                    <img src="../PaginaWEB/assets/img/steam.png" alt="Steam">
                    <span>Steam</span>
                    </a>
                    <a class="link-item" href="https://myanimelist.net/profile/Luisfenix117" target="_blank">
                    <img src="../PaginaWEB/assets/img/myanimelist.png" alt="MyAnimeList">
                    <span>MyAnimeList</span>
                    </a>
                    <a class="link-item" href="https://www.tiktok.com/@luisfenix117" target="_blank">
                    <img src="../PaginaWEB/assets/img/tiktok.png" alt="TikTok">
                    <span>TikTok</span>
                    </a>
                </nav>
                <!-- --- /INFO --- -->

            </section>
        </div>

        <div class="panel panel-right ui-frame">
            <header class="panel-header">
                <span class="system-id">ACTIVITY_LOG</span>
            </header>
            <section class="panel-content audio-section">
                <div class="music-player">
                     <audio id="bg-audio"></audio>
                    <button class="player-btn" onclick="playAmbient()">> PLAY_AMBIENT</button>
                    <button class="player-btn" onclick="pauseAmbient()">[ PAUSE ]</button>
                    <button class="player-btn" onclick="nextTrack()">>> NEXT_TRACK</button>

                    <div class="audio-visualizer">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                
                <!-- Widget de MyAnimeList con últimas actualizaciones de anime y manga -->
                <div class="mal-widget">
                    <div class="mal-section">
                        <h3>Manga recientes</h3>
                        <div id="mal-manga-list" class="mal-list">Cargando...</div>
                    </div>
                    <div class="mal-section">
                        <h3>Anime recientes</h3>
                        <div id="mal-anime-list" class="mal-list">Cargando...</div>
                    </div>
                </div>
            </section>
        </div>

        <footer class="system-footer ui-frame">
            <span class="version">V_1.0 //</span>
            <span class="help-text">SYSTEM SECURED // WAITING FOR INPUT...</span>
        </footer>

    </main>

    <script src="assets/scripts/Music.js"></script>
    
    <script src="assets/scripts/MALscrap.js"></script>

    
</body>
</html>
